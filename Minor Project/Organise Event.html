<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Organize Event Modal</title>
  <link rel="stylesheet" href="Organise Event.css">
  <link rel="stylesheet" href="Animations.css">
</head>
<body>
  <div id="organizeModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <h2>Organize an Event</h2>
      <form id="organizeEventForm" onsubmit="submitEvent(event)">
        <label for="eventName">Event Name:</label><br>
        <input type="text" id="eventName" required><br><br>

        <label for="eventDescription">Description:</label><br>
        <textarea id="eventDescription" placeholder="Write a Description About your Event" rows="5" required></textarea><br><br>

        <label for="eventCategory">Category:</label><br>
        <select id="eventCategory" required>
          <option value="">Select Category</option>
          <option value="Tech">Tech</option>
          <option value="Sports">Sports Tournament</option>
          <option value="Music">Music Festival</option>
          <option value="Art">Art Exhibition</option>
          <option value="Cultural">Drama Club</option>
          <option value="Business">Entrepreneurship Summit</option>
          <option value="Other">Other</option>
        </select><br><br>

        <label for="eventDate">Event Date:</label><br>
        <input type="date" id="eventDate" placeholder="dd-mm-yyyy" required><br><br>

        <label for="eventStartTime">Start Time:</label><br>
        <input type="time" id="eventStartTime" required><br><br>

        <label for="eventEndTime">End Time:</label><br>
        <input type="time" id="eventEndTime" required><br><br>

        <label for="eventType">Event Type:</label><br>
        <select id="eventType" required onchange="handleEventTypeChange()">
          <option value="single-day">Single Day Event</option>
          <option value="multi-day">Multi-Day Event</option>
        </select><br><br>

        <div id="endDateContainer" style="display: none;">
          <label for="eventEndDate">End Date:</label><br>
          <input type="date" id="eventEndDate"><br><br>
        </div>

        <label for="eventVenue">Venue:</label><br>
        <input type="text" id="eventVenue" required><br><br>

        <label for="eventCapacity">Capacity (Number of Participants):</label><br>
        <input type="number" id="eventCapacity" min="1" required><br><br>

        <label for="eventImage">Event Image (optional):</label><br>
        <input type="file" id="eventImage" accept="image/*"><br>
        <p style="font-size: 12px; color: #666;">Recommended size: 400x300 pixels, max 5MB</p><br>

        <button type="submit">Submit Event</button>
      </form>
    </div>
  </div>
  <script src="Organise Event.js"></script>
  <script src="Animations.js"></script>
</body>
</html>
