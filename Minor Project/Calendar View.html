<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar View</title>
    <link rel="stylesheet" href="Calendar View.css">
    <link rel="stylesheet" href="Global-Dark-Mode.css">
    <link rel="stylesheet" href="Animations.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="Home Page.html" class="nav-logo">🎉 EventHub</a>
            <ul class="nav-menu">
                <li><a href="Home Page.html">Home</a></li>
                <li><a href="Event Search.html">Events</a></li>
                <li><a href="My Registrations.html">My Events</a></li>
                <li><a id="logoutBtn" href="#" onclick="calendarView.logout(); return false;" style="display:none;">Logout</a></li>
                <li><a id="userNameBtn" href="Profile Dashboard.html" class="nav-user-name" style="display:none;"></a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>📅 Event Calendar</h1>

        <div class="calendar-controls">
            <button id="prevMonthBtn" class="btn-nav">← Previous</button>
            <h2 id="monthYear" class="month-year">January 2024</h2>
            <button id="nextMonthBtn" class="btn-nav">Next →</button>
        </div>

        <div class="calendar-view">
            <!-- Days of week header -->
            <div class="weekdays">
                <div class="weekday">Sun</div>
                <div class="weekday">Mon</div>
                <div class="weekday">Tue</div>
                <div class="weekday">Wed</div>
                <div class="weekday">Thu</div>
                <div class="weekday">Fri</div>
                <div class="weekday">Sat</div>
            </div>

            <!-- Calendar days -->
            <div id="calendarDays" class="calendar-days">
                <!-- Days will be generated by JavaScript -->
            </div>
        </div>

        <!-- Event List for Selected Day -->
        <div class="selected-day-section">
            <h2 id="selectedDateTitle">Events for Today</h2>
            <div id="eventsList" class="events-list">
                <!-- Events will be loaded here -->
            </div>
        </div>

        <!-- Upcoming Events Section -->
        <div class="upcoming-section">
            <h2>📍 Upcoming Events (Next 30 Days)</h2>
            <div id="upcomingEventsList" class="events-timeline">
                <!-- Upcoming events will be loaded here -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 College Events Portal. All rights reserved.</p>
    </footer>

    <script src="Dark-Mode.js"></script>
    <script src="api-client.js"></script>
    <script src="Calendar View.js"></script>
    <script src="Animations.js"></script>
</body>
</html>
