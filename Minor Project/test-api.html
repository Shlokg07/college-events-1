<!DOCTYPE html>
<html>
<head>
  <title>Backend Connection Test</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #f5f5f5; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 10px 0; }
    button:hover { background: #0056b3; }
    .log { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 4px; max-height: 300px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Backend Connection Test</h1>
    
    <div>
      <button onclick="testBackendConnection()">Test Backend Connection</button>
      <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <h3>Console Output:</h3>
    <div id="log" class="log">Waiting for test...</div>
  </div>

  <script src="api-client.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const defaultLog = console.log;

    // Intercept console.log, console.error, console.warn
    console.log = function(...args) {
      const msg = args.join(' ');
      logEl.innerHTML += '<span class="info">' + msg + '</span>\n';
      logEl.scrollTop = logEl.scrollHeight;
      defaultLog(...args);
    };

    console.error = function(...args) {
      const msg = args.join(' ');
      logEl.innerHTML += '<span class="error">' + msg + '</span>\n';
      logEl.scrollTop = logEl.scrollHeight;
    };

    console.warn = function(...args) {
      const msg = args.join(' ');
      logEl.innerHTML += '<span>' + msg + '</span>\n';
      logEl.scrollTop = logEl.scrollHeight;
    };

    async function testBackendConnection() {
      console.log('🧪 Starting backend connection test...');
      console.log('Attempting to reach: http://localhost:3000/api/health\n');
      
      const isConnected = await api.testConnection();
      
      if (isConnected) {
        console.log('✅ SUCCESS! Backend is working correctly.');
        console.log('You can now create events on the Home Page.');
      } else {
        console.log('❌ FAILED! Backend is not reachable.');
        console.log('Make sure to:');
        console.log('1. Start the backend with: cd backend && node server.js');
        console.log('2. Ensure MongoDB is running');
        console.log('3. Check that port 3000 is available');
      }
    }

    function clearLog() {
      logEl.innerHTML = '';
    }

    // Auto-run test on page load
    window.addEventListener('load', () => {
      setTimeout(testBackendConnection, 500);
    });
  </script>
</body>
</html>
